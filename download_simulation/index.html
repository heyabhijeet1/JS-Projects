<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Simulator</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: Arial, sans-serif;
            color: #18212f;
            background: #eef2f7;
        }

        .download-card {
            width: min(100%, 420px);
            padding: 30px;
            border-radius: 18px;
            background: #ffffff;
            box-shadow: 0 18px 50px rgba(26, 39, 63, 0.12);
        }

        .file-icon {
            width: 54px;
            height: 62px;
            display: grid;
            place-items: center;
            margin-bottom: 18px;
            border-radius: 10px;
            font-size: 25px;
            background: #e8f0ff;
        }

        h1 {
            margin: 0 0 8px;
            font-size: 24px;
        }

        .file-name {
            margin: 0 0 26px;
            color: #667085;
            font-size: 14px;
        }

        .download-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 9px;
            font-size: 14px;
        }

        .progress-track {
            height: 11px;
            overflow: hidden;
            border-radius: 999px;
            background: #e9edf3;
        }

        .progress-bar {
            width: 0;
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, #3478f6, #65a2ff);
        }

        .download-button {
            width: 100%;
            margin-top: 26px;
            padding: 13px 18px;
            border: 0;
            border-radius: 10px;
            color: #ffffff;
            background: #3478f6;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }

        .download-button:hover {
            background: #2468df;
        }
    </style>
</head>
<body>
    <main class="download-card">
        <div class="file-icon" aria-hidden="true">📄</div>
        <h1>Download file</h1>
        <p class="file-name">project-files.zip · 24 MB</p>

        <div class="download-info">
            <span id="status">Ready to download</span>
            <span id="percentage">0%</span>
        </div>

        <div class="progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <button class="download-button" id="downloadButton" type="button">
            Start download
        </button>
    </main>

    <script src="script.js"></script>
</body>
</html>
